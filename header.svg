<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="50%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="16"/>

  <!-- Animated grid lines -->
  <g opacity="0.15" stroke="#a78bfa" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/><line x1="800" y1="0" x2="800" y2="200"/>
  </g>

  <!-- Floating data dots -->
  <circle cx="80" cy="60" r="3" fill="#60a5fa" opacity="0.8">
    <animate attributeName="cy" values="60;50;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="140" r="4" fill="#34d399" opacity="0.8">
    <animate attributeName="cy" values="140;130;140" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="160" r="2.5" fill="#a78bfa" opacity="0.7">
    <animate attributeName="cy" values="160;150;160" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="50" r="3" fill="#f472b6" opacity="0.7">
    <animate attributeName="cy" values="50;40;50" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="30" r="2" fill="#60a5fa" opacity="0.6">
    <animate attributeName="cy" values="30;20;30" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Mini bar chart decoration left -->
  <g transform="translate(40, 110)" opacity="0.6">
    <rect x="0" y="0" width="8" height="30" fill="#a78bfa" rx="2">
      <animate attributeName="height" values="30;40;30" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="0;-10;0" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="12" y="-15" width="8" height="45" fill="#60a5fa" rx="2">
      <animate attributeName="height" values="45;35;45" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-15;-5;-15" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="24" y="-5" width="8" height="35" fill="#34d399" rx="2">
      <animate attributeName="height" values="35;50;35" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-5;-20;-5" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="36" y="-20" width="8" height="50" fill="#f472b6" rx="2">
      <animate attributeName="height" values="50;38;50" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-20;-8;-20" dur="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Mini line chart decoration right -->
  <g transform="translate(790, 80)" opacity="0.6">
    <polyline points="0,40 15,25 30,30 45,10 60,20 75,5" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="points" values="0,40 15,25 30,30 45,10 60,20 75,5;0,35 15,20 30,35 45,15 60,25 75,8;0,40 15,25 30,30 45,10 60,20 75,5" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <circle cx="75" cy="5" r="3" fill="#34d399">
      <animate attributeName="cy" values="5;8;5" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main title -->
  <text x="450" y="85" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="bold" fill="url(#textGrad)" filter="url(#glow)">
    Hi, I'm Rehab Ali 👋
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- Subtitle with typewriter feel -->
  <text x="450" y="125" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#cbd5e1" letter-spacing="2">
    Data Analyst  ·  BI Developer  ·  Data Visualization Specialist
    <animate attributeName="opacity" values="0;0;1" dur="1.8s" fill="freeze"/>
  </text>

  <!-- Animated underline -->
  <line x1="200" y1="140" x2="700" y2="140" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.5">
    <animate attributeName="x1" values="450;200;200" dur="1s" fill="freeze"/>
    <animate attributeName="x2" values="450;700;700" dur="1s" fill="freeze"/>
  </line>

  <!-- Bottom tagline -->
  <text x="450" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="1">
    Turning raw data into decisions  📊
    <animate attributeName="opacity" values="0;0;0;1" dur="2.5s" fill="freeze"/>
  </text>
</svg>
